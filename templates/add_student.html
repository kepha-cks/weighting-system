{% extends "base.html" %}
{% block app_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-lines-fill"></i> Register Student Profile
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <!-- Personal Info -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Combination</label>
                            <input type="text" name="combination" class="form-control" placeholder="e.g. PCM" required>
                        </div>
                    </div>

                    <hr class="my-4">
                    <h6 class="text-muted mb-3"><i class="bi bi-book me-2"></i>A-Level Subjects</h6>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" name="a_sub" class="form-control" placeholder="Subject (e.g. Physics)">
                        </div>
                        <div class="col-md-3">
                            <input type="text" name="a_grade" class="form-control" placeholder="Grade">
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="a_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="a_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="a_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="a_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="a_sub" class="form-control" placeholder="Subsidiary (Sub-Math/Sub-ICT)"></div>
                        <div class="col-md-3"><input type="text" name="a_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="a_sub" class="form-control" placeholder="General Paper (GP)"></div>
                        <div class="col-md-3"><input type="text" name="a_grade" class="form-control" placeholder="Grade"></div>
                    </div>

                    <hr class="my-4">
                    <h6 class="text-muted mb-3"><i class="bi bi-journal-check me-2"></i>O-Level Subjects (Best 10)</h6>

                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade (A-E)"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6"><input type="text" name="o_sub" class="form-control" placeholder="Subject"></div>
                        <div class="col-md-3"><input type="text" name="o_grade" class="form-control" placeholder="Grade"></div>
                    </div>

                    <div class="d-grid mt-4">
                        <button class="btn btn-lg btn-gold">
                            <i class="bi bi-save me-2"></i> Save Student
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
